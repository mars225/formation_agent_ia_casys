<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Formation — Développement assisté par agents IA · CaSys Côte d'Ivoire</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

:root{
  --blue:#003C87;--blue-d:#002055;--blue-l:rgba(0,60,135,.18);
  --gold:#F5B400;--gold-d:#C48E00;--gold-l:rgba(245,180,0,.15);
  --white:#fff;--bg:#020c1a;
  --teal:#5DCAA5;--coral:#F0997B;--purple:#C084FC;--red:#f87171;--green:#4ade80;--sky:#85B7EB;
  --text:rgba(255,255,255,.85);--muted:rgba(255,255,255,.5);--dim:rgba(255,255,255,.25);
  --card:rgba(255,255,255,.055);--card-h:rgba(255,255,255,.1);
  --border:rgba(255,255,255,.1);--border-h:rgba(245,180,0,.4);
  --font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;--font-code:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);overflow:hidden}

/* CANVAS */
#c{position:fixed;inset:0;width:100%;height:100%;z-index:0}

/* LAYOUT */
#shell{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;overflow:hidden}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;flex-shrink:0;background:rgba(2,8,24,.6);backdrop-filter:blur(16px);border-bottom:1px solid rgba(245,180,0,.15)}
.brand{display:flex;align-items:center;gap:10px}
.brand-ico{width:32px;height:32px;background:var(--blue);border:1.5px solid var(--gold);border-radius:8px;display:grid;place-items:center;font-family:var(--font-head);font-size:15px;font-weight:800;color:var(--gold);flex-shrink:0}
.brand-name{font-family:var(--font-head);font-size:14px;font-weight:800;color:#fff;letter-spacing:.3px}
.brand-sub{font-size:10px;color:var(--gold);letter-spacing:.4px;margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:16px}
.chap-pills{display:flex;gap:6px}
.cpill{font-size:10px;font-weight:600;padding:4px 12px;border-radius:20px;border:1px solid;cursor:pointer;transition:.2s;letter-spacing:.04em;font-family:var(--font-body)}
.cpill.pourquoi{border-color:rgba(248,113,113,.4);color:#f87171;background:rgba(248,113,113,.08)}
.cpill.pourquoi.on,.cpill.pourquoi:hover{background:rgba(248,113,113,.22);border-color:#f87171}
.cpill.formation{border-color:rgba(245,180,0,.4);color:var(--gold);background:rgba(245,180,0,.08)}
.cpill.formation.on,.cpill.formation:hover{background:rgba(245,180,0,.22);border-color:var(--gold)}
.cpill.repo{border-color:rgba(93,202,165,.4);color:var(--teal);background:rgba(93,202,165,.08)}
.cpill.repo.on,.cpill.repo:hover{background:rgba(93,202,165,.22);border-color:var(--teal)}
.slide-count{font-size:11px;color:var(--dim);font-family:var(--font-code)}

/* MAIN */
.main{flex:1;display:flex;align-items:stretch;overflow:hidden;min-height:0}
.content-col{width:52%;padding:24px 28px;display:flex;flex-direction:column;justify-content:center;min-height:0;overflow:hidden}
.viz-col{flex:1;position:relative;pointer-events:none}

/* SLIDE CONTENT */
.slide-wrap{opacity:0;transform:translateY(16px);transition:opacity .45s,transform .45s}
.slide-wrap.show{opacity:1;transform:none}
.stag{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;margin-bottom:10px;transition:color .3s}
.sh1{font-family:var(--font-head);font-size:clamp(20px,2.8vw,30px);font-weight:800;color:#fff;line-height:1.18;margin-bottom:10px}
.sdesc{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:16px}

/* CARDS */
.cards{display:grid;gap:8px;margin-bottom:12px}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}
.g1{grid-template-columns:1fr}
.card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px 13px;transition:.22s;cursor:default}
.card:hover{background:var(--card-h);border-color:var(--border-h);transform:translateY(-2px)}
.ci{font-size:18px;margin-bottom:6px}
.ct{font-size:11px;font-weight:600;color:#fff;margin-bottom:3px}
.cb{font-size:10px;color:var(--muted);line-height:1.5}

/* COMPARE */
.cmp{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.cmp-col{border-radius:10px;overflow:hidden}
.cmp-hd{padding:7px 11px;font-size:10px;font-weight:700;letter-spacing:.04em}
.cmp-hd.bad{background:rgba(120,30,30,.6);color:#fca5a5;border-bottom:1px solid rgba(248,113,113,.2)}
.cmp-hd.good{background:rgba(10,80,50,.6);color:#4ade80;border-bottom:1px solid rgba(74,222,128,.2)}
.cmp-body{background:rgba(0,0,0,.38);border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px}
.cmp-row{padding:6px 11px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:flex-start;gap:7px}
.cmp-row:last-child{border-bottom:none}
.cmp-ico{font-size:11px;flex-shrink:0;margin-top:1px}
.cmp-txt{font-size:9.5px;color:rgba(255,255,255,.62);line-height:1.5}
.cmp-txt b{color:#fff;font-weight:600}

/* TIMELINE */
.timeline{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.trow{display:flex;align-items:flex-start;gap:9px;padding:8px 11px;background:var(--card);border-radius:8px;border:1px solid var(--border)}
.tnum{width:20px;height:20px;border-radius:50%;display:grid;place-items:center;font-size:9px;font-weight:800;flex-shrink:0;margin-top:1px}
.ttit{font-size:10.5px;font-weight:600;color:#fff;margin-bottom:2px}
.tbod{font-size:10px;color:var(--muted);line-height:1.45}

/* SCENARIO */
.scenario{border-radius:10px;overflow:hidden;border:1px solid var(--border);margin-bottom:10px}
.sc-head{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.04)}
.sc-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px}
.sc-title{font-size:10.5px;font-weight:600;color:#fff}
.sc-body{display:grid;grid-template-columns:1fr 1fr}
.sc-half{padding:9px 12px;font-size:9px;line-height:1.6;font-family:var(--font-code)}
.sc-half.left{border-right:1px solid var(--border);color:#fca5a5;background:rgba(180,30,30,.08)}
.sc-half.right{color:#86efac;background:rgba(30,120,60,.08)}
.sc-lbl{font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;opacity:.65;font-family:var(--font-body)}

/* CODE */
.cb-wrap{background:rgba(0,0,0,.55);border:1px solid rgba(245,180,0,.22);border-radius:10px;padding:10px 13px;margin-bottom:9px}
.cb-lbl{font-size:9px;font-weight:700;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;font-family:var(--font-body)}
pre{white-space:pre-wrap;font-size:10px;line-height:1.68;font-family:var(--font-code);color:#93c5fd}
.kw{color:var(--gold)}.str{color:#86efac}.cm{color:rgba(255,255,255,.3);font-style:italic}.pv{color:#fca5a5;font-style:italic}

/* ANNOTATIONS */
.anns{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.ann{display:flex;align-items:flex-start;gap:8px;background:var(--card);border-radius:7px;padding:7px 10px;border-left:2.5px solid}
.ann-l{font-size:10px;font-weight:700;min-width:105px;margin-top:1px;font-family:var(--font-code)}
.ann-b{font-size:10px;color:var(--muted);line-height:1.5}

/* FLOW */
.flow{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.fpill{font-size:10px;font-weight:600;padding:4px 11px;border-radius:16px;border:1px solid}
.farr{color:var(--dim);font-size:13px}

/* STEPS */
.steps{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.step{display:flex;align-items:flex-start;gap:9px;padding:8px 11px;background:var(--card);border-radius:9px;border:1px solid var(--border)}
.step-n{width:21px;height:21px;border-radius:50%;display:grid;place-items:center;font-size:9.5px;font-weight:800;flex-shrink:0;margin-top:1px}
.step-t{font-size:10.5px;font-weight:600;color:#fff;margin-bottom:2px}
.step-b{font-size:10px;color:var(--muted);line-height:1.45}

/* MATRIX */
.matrix{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.mx-row{display:grid;grid-template-columns:85px 1fr 1fr;gap:6px;align-items:start;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
.mx-tool{font-size:10px;font-weight:700}
.mx-col-lbl{font-size:8px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:3px;font-family:var(--font-body)}
.mx-col-txt{font-size:9.5px;color:var(--muted);line-height:1.45}

/* REPO TREE */
.tree{background:rgba(0,0,0,.5);border:1px solid rgba(93,202,165,.25);border-radius:10px;padding:11px 13px;font-family:var(--font-code);font-size:9.5px;line-height:1.8;color:#93c5fd;margin-bottom:9px}
.tr-dir{color:var(--gold);font-weight:700}
.tr-cmt{color:rgba(255,255,255,.3);font-style:italic}
.tr-hi{color:var(--teal)}

/* TIP */
.tip{background:rgba(245,180,0,.1);border:1px solid rgba(245,180,0,.28);border-radius:8px;padding:8px 12px;font-size:10.5px;color:rgba(255,255,255,.75);line-height:1.55;margin-top:6px}

/* CHAPTER DIVIDER */
.ch-divider{background:linear-gradient(135deg,var(--blue-d),var(--bg));border-top:1px solid rgba(245,180,0,.3);border-bottom:1px solid rgba(245,180,0,.3);padding:18px 28px;display:flex;align-items:center;gap:16px;margin-bottom:0}
.ch-num{font-family:var(--font-head);font-size:52px;font-weight:800;line-height:1;opacity:.15;color:#fff}
.ch-title{font-family:var(--font-head);font-size:22px;font-weight:800;color:#fff}
.ch-sub{font-size:12px;color:var(--muted);margin-top:4px}
.ch-badge{font-size:10px;font-weight:700;padding:4px 12px;border-radius:20px;border:1px solid;margin-top:8px;display:inline-block}

/* NAV BOTTOM */
.navbar{display:flex;align-items:center;justify-content:space-between;padding:10px 28px;flex-shrink:0;background:rgba(2,8,24,.6);backdrop-filter:blur(12px);border-top:1px solid rgba(245,180,0,.1)}
.ndots{display:flex;gap:5px;align-items:center}
.ndot{width:5px;height:5px;border-radius:50%;background:var(--dim);border:none;cursor:pointer;transition:.2s;padding:0;flex-shrink:0}
.ndot.on{background:var(--gold);transform:scale(1.5)}
.ndot.ch-mark{width:7px;height:7px;background:rgba(245,180,0,.3);border:1px solid rgba(245,180,0,.5)}
.ndot.ch-mark.on{background:var(--gold);border-color:var(--gold)}
.ndot:hover{background:rgba(245,180,0,.5)}
.nbtns{display:flex;gap:8px}
.nbtn{background:rgba(0,50,120,.5);border:1px solid rgba(245,180,0,.45);color:#fff;border-radius:30px;padding:7px 20px;font-size:11px;font-weight:600;cursor:pointer;transition:.18s;font-family:var(--font-body);letter-spacing:.04em}
.nbtn:hover{background:var(--blue);border-color:var(--gold)}
.nbtn:disabled{opacity:.22;cursor:default;transform:none}
.kb-hint{font-size:9px;color:var(--dim);display:flex;gap:8px;align-items:center}
.kb-key{background:rgba(255,255,255,.08);border:1px solid var(--dim);border-radius:4px;padding:2px 6px;font-family:var(--font-code);font-size:8px}

/* RESPONSIVE */
@media(max-width:700px){
  .viz-col{display:none}
  .content-col{width:100%;padding:16px 18px}
  .g3{grid-template-columns:repeat(2,1fr)}
  .cmp{grid-template-columns:1fr}
  .sc-body{grid-template-columns:1fr}
  .sc-half.left{border-right:none;border-bottom:1px solid var(--border)}
  .mx-row{grid-template-columns:1fr}
  .chap-pills{display:none}
  .kb-hint{display:none}
  .topbar{padding:10px 16px}
  .navbar{padding:8px 16px}
  .sh1{font-size:clamp(18px,5vw,26px)}
}
@media(max-width:480px){
  .g3,.g2{grid-template-columns:1fr}
}

/* PROGRESS BAR */
.prog-bar{height:2px;background:rgba(255,255,255,.08);flex-shrink:0}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--gold));transition:width .4s ease}

/* COVER SLIDE */
.cover{text-align:left}
.cover .sh1{font-size:clamp(26px,4vw,42px);line-height:1.1;margin-bottom:14px}
.cover-sub{font-size:13px;color:var(--gold);font-family:var(--font-code);letter-spacing:.05em;margin-bottom:20px}
.cover-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.ctag{font-size:10px;font-weight:600;padding:4px 12px;border-radius:20px;border:1px solid;font-family:var(--font-body)}

/* CHAPTER SLIDE */
.ch-slide{display:flex;flex-direction:column;justify-content:center;height:100%}
.ch-slide .ch-n{font-family:var(--font-head);font-size:80px;font-weight:800;opacity:.08;color:#fff;line-height:1;margin-bottom:8px}
.ch-slide .ch-t{font-family:var(--font-head);font-size:clamp(22px,3.5vw,34px);font-weight:800;color:#fff;line-height:1.15;margin-bottom:10px}
.ch-slide .ch-d{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:18px;max-width:380px}
.ch-slide .ch-slides{font-size:10px;color:var(--dim);font-family:var(--font-code)}
</style>
</head>

</div>

var SLIDES=[
/* ────────── CHAPITRE 0 : POURQUOI ────────── */
{ch:0,type:'chapter',

/* ═══════════════════════════════════════

function buildHTML(s){
  if(s.type==='chapter'){
    return '<div class="ch-slide">'+
      '<div class="ch-n">'+s.n+'</div>'+
      '<div class="stag" style="color:'+chapterColor(s.ch)+'">Chapitre '+s.n+'</div>'+
      '<div class="sh1 ch-t">'+s.t.replace(/\n/,'<br>')+'</div>'+
      '<div class="sdesc ch-d">'+s.d+'</div>'+
      '<div class="ch-slides" style="color:'+chapterColor(s.ch)+'">'+s.slides+'</div>'+
      '</div>';
  }
  var h='<div class="stag" style="color:'+chapterColor(s.ch)+'">'+s.tag+'</div>';
  h+='<div class="sh1">'+s.h1.replace(/\n/,'<br>')+'</div>';
  h+='<div class="sdesc">'+s.desc+'</div>';

  if(s.type==='cards3'||s.type==='cards2'){
    var g=s.cards.length<=3?'g'+s.cards.length:(s.cards.length===4?'g2':'g3');
    h+='<div class="cards '+g+'">';
    s.cards.forEach(function(c){h+='<div class="card"><div class="ci">'+c.i+'</div><div class="ct">'+c.t+'</div><div class="cb">'+c.b+'</div></div>';});
    h+='</div>';
  }
  if(s.type==='cmp'){
    h+='<div class="cmp">';
    ['bad','good'].forEach(function(k){
      var d=s[k],isBad=k==='bad';
      h+='<div class="cmp-col"><div class="cmp-hd '+(isBad?'bad':'good')+'">'+(isBad?'✗ ':'✓ ')+d.head+'</div><div class="cmp-body">';
      d.rows.forEach(function(r){h+='<div class="cmp-row"><span class="cmp-ico">'+r.i+'</span><span class="cmp-txt">'+r.t+'</span></div>';});
      h+='</div></div>';
    });
    h+='</div>';
  }
  if(s.type==='timeline'){
    h+='<div class="timeline">';
    s.rows.forEach(function(r){h+='<div class="trow"><div class="tnum" style="background:'+r.c+'22;color:'+r.c+';border:1.5px solid '+r.c+'">'+r.n+'</div><div><div class="ttit">'+r.t+'</div><div class="tbod">'+r.b+'</div></div></div>';});
    h+='</div>';
    if(s.tip) h+='<div class="tip">💡 '+s.tip+'</div>';
  }
  if(s.type==='scenario'){
    var sc=s.sc;
    h+='<div class="scenario"><div class="sc-head" style="background:'+sc.bc+'20"><span class="sc-badge" style="background:'+sc.bc+';color:'+sc.btc+'">'+sc.badge+'</span><span class="sc-title">'+sc.title+'</span></div><div class="sc-body"><div class="sc-half left"><div class="sc-lbl">CLI simple / chat</div><pre>'+sc.left+'</pre></div><div class="sc-half right"><div class="sc-lbl">Agent + skill</div><pre>'+sc.right+'</pre></div></div></div>';
    if(s.tip) h+='<div class="tip">💡 '+s.tip+'</div>';
  }
  if(s.type==='matrix'){
    h+='<div class="matrix">';
    s.rows.forEach(function(r){
      h+='<div class="mx-row"><div class="mx-tool" style="color:'+r.tc+'">'+r.tool+'</div><div><div class="mx-col-lbl" style="color:#4ade80">Idéal pour</div><div class="mx-col-txt">'+r.best+'</div></div><div><div class="mx-col-lbl" style="color:#f87171">Limite</div><div class="mx-col-txt">'+r.limit+'</div></div></div>';
    });
    h+='</div>';
    if(s.tip) h+='<div class="tip">💡 '+s.tip+'</div>';
  }
  if(s.type==='code+ann'){
    h+='<div class="cb-wrap"><pre>'+s.code+'</pre></div>';
    h+='<div class="anns">';
    s.anns.forEach(function(a){h+='<div class="ann" style="border-color:'+a.c+'"><span class="ann-l" style="color:'+a.c+'">'+a.l+'</span><span class="ann-b">'+a.b+'</span></div>';});
    h+='</div>';
  }
  if(s.type==='prompts2'){
    h+='<div class="cb-wrap"><div class="cb-lbl">'+s.p1lbl+'</div><pre>'+s.p1+'</pre></div>';
    h+='<div class="cb-wrap"><div class="cb-lbl">'+s.p2lbl+'</div><pre>'+s.p2+'</pre></div>';
  }
  if(s.type==='tree'){
    h+='<div class="tree"><pre>'+s.tree+'</pre></div>';
  }
  if(s.type==='steps'){
    h+='<div class="steps">';
    s.steps.forEach(function(st){h+='<div class="step"><div class="step-n" style="background:'+st.c+'22;color:'+st.c+';border:1.5px solid '+st.c+'">'+st.n+'</div><div><div class="step-t">'+st.t+'</div><div class="step-b">'+st.b+'</div></div></div>';});
    h+='</div>';
    if(s.tip) h+='<div class="tip">💡 '+s.tip+'</div>';
  }
  return h;
}

function chapterColor(ch){
  return ['#f87171','#F5B400','#5DCAA5'][ch]||'#F5B400';
}

var cur=0;
function render(idx){
  var s=SLIDES[idx];
  var p=document.getElementById('panel');
  p.classList.remove('show');
  setTimeout(function(){
    p.innerHTML=buildHTML(s);
    requestAnimationFrame(function(){p.classList.add('show');});
  },120);
  document.getElementById('sc2').textContent=(idx+1)+' / '+SLIDES.length;
  var pct=((idx+1)/SLIDES.length*100).toFixed(1);
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('bp').disabled=idx===0;
  document.getElementById('bn').disabled=idx===SLIDES.length-1;
  document.querySelectorAll('.ndot').forEach(function(d,i){d.classList.toggle('on',i===idx);});
  document.querySelectorAll('.cpill').forEach(function(p,i){p.classList.toggle('on',CHAPTERS[i]&&idx>=CHAPTERS[i].start&&(i===CHAPTERS.length-1||idx<CHAPTERS[i+1].start));});
  setViz(s.viz||'intro',s.ch);
}
function go(d){var n=cur+d;if(n<0||n>=SLIDES.length)return;cur=n;render(cur);}
function jumpChapter(ci){cur=CHAPTERS[ci].start;render(cur);}

var dotsEl=document.getElementById('dots');
SLIDES.forEach(function(s,i){
  var d=document.createElement('button');
  var isCh=s.type==='chapter';
  d.className='ndot'+(isCh?' ch-mark':'');
  d.setAttribute('aria-label','Slide '+(i+1));
  d.onclick=function(){cur=i;render(cur);};
  dotsEl.appendChild(d);
});

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key==='ArrowDown') go(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') go(-1);
  if(e.key==='1') jumpChapter(0);
  if(e.key==='2') jumpChapter(1);
  if(e.key==='3') jumpChapter(2);
});

var vizNodes=[];
function buildVizNodes(v){
  var defs=VIZ_DEFS[v]||VIZ_DEFS['intro'];
  var vW=vizC.offsetWidth||300,vH=vizC.offsetHeight||600;
  return defs.map(function(n){return {l:n.l,x:n.x*vW,y:n.y*vH,c:n.c,r:n.r,phase:Math.random()*Math.PI*2};});
}

function drawBG(){
  bgX.clearRect(0,0,W,H);
  var cx=W*.5,cy=H*.5;
  var grd=bgX.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*.7);
  grd.addColorStop(0,'rgba(0,40,100,.12)');
  grd.addColorStop(.6,'rgba(0,10,30,.06)');
  grd.addColorStop(1,'rgba(2,8,24,0)');
  bgX.fillStyle=grd;bgX.fillRect(0,0,W,H);

  particles.forEach(function(p){
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;
    if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    bgX.globalAlpha=p.a*.55;bgX.beginPath();bgX.arc(p.x,p.y,p.r,0,Math.PI*2);
    bgX.fillStyle=p.col;bgX.fill();bgX.globalAlpha=1;
  });

  var chColors=['rgba(248,113,113,.06)','rgba(245,180,0,.06)','rgba(93,202,165,.06)'];
  bgX.beginPath();bgX.arc(W*.18,H*.5,Math.min(W,H)*.45,0,Math.PI*2);
  bgX.strokeStyle=chColors[currentCh]||chColors[0];bgX.lineWidth=1;
  bgX.setLineDash([3,10]);bgX.stroke();bgX.setLineDash([]);
}

function drawViz(){
  var vW=vizC.offsetWidth,vH=vizC.offsetHeight;
  vizX.clearRect(0,0,vW,vH);

  var es=VIZ_EDGES[currentViz]||[];
  es.forEach(function(e){
    var a=vizNodes[e[0]],b=vizNodes[e[1]];
    if(!a||!b)return;
    var pulse=Math.sin(tick*.016)*.5+.5;
    vizX.beginPath();vizX.moveTo(a.x,a.y);vizX.lineTo(b.x,b.y);
    vizX.strokeStyle='rgba(245,180,0,'+(0.1+pulse*.1)+')';
    vizX.lineWidth=1.2;vizX.setLineDash([4,8]);vizX.stroke();vizX.setLineDash([]);
    var prog=(tick*.014+e[0]*.3)%1;
    var mx=a.x+(b.x-a.x)*prog,my=a.y+(b.y-a.y)*prog;
    vizX.beginPath();vizX.arc(mx,my,2.5,0,Math.PI*2);
    vizX.fillStyle='#F5B400';vizX.globalAlpha=.65;vizX.fill();vizX.globalAlpha=1;
  });

  vizNodes.forEach(function(nd){
    if(!nd)return;
    var pulse=Math.sin(tick*.02+nd.phase)*.5+.5;
    var r=nd.r+pulse*2.5;
    vizX.save();
    vizX.beginPath();vizX.arc(nd.x,nd.y,r+8,0,Math.PI*2);
    vizX.fillStyle=nd.c+'18';vizX.fill();
    vizX.beginPath();vizX.arc(nd.x,nd.y,r,0,Math.PI*2);
    vizX.strokeStyle=nd.c;vizX.lineWidth=1.8;
    vizX.globalAlpha=.72+pulse*.12;vizX.stroke();
    vizX.fillStyle=nd.c+'22';vizX.fill();
    vizX.globalAlpha=1;
    var lines=nd.l.split('\n');
    vizX.font='bold 9px DM Sans,system-ui';
    vizX.textAlign='center';vizX.textBaseline='middle';
    vizX.fillStyle='#fff';vizX.globalAlpha=.9;
    var ly=nd.y-(lines.length-1)*6;
    lines.forEach(function(ln,li){vizX.fillText(ln,nd.x,ly+li*12);});
    vizX.globalAlpha=1;vizX.restore();
  });

  var cx=vW*.5,cy=vH*.48,bigR=Math.min(vW,vH)*.38;
  var glow=Math.sin(tick*.012)*.5+.5;
  vizX.beginPath();vizX.arc(cx,cy,bigR,0,Math.PI*2);
  vizX.strokeStyle='rgba(0,60,135,'+(0.05+glow*.04)+')';
  vizX.lineWidth=1;vizX.setLineDash([3,10]);vizX.stroke();vizX.setLineDash([]);
  vizX.beginPath();vizX.arc(cx,cy,bigR*.6,0,Math.PI*2);
  vizX.strokeStyle='rgba(245,180,0,'+(0.04+glow*.03)+')';
  vizX.lineWidth=.8;vizX.stroke();
}

function loop(){requestAnimationFrame(loop);tick++;drawBG();drawViz();}
